<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/FRONTEND/css/main.css" />
    <title>Login SGT_Professionals</title>
  </head>
  <body id="body">
    <main id="app" class="app">
        <div id="login">
        <div id="card-login">
             <div class="login-header">
            <img class="logo" src="/FRONTEND/img/-SGT-Professionals-2-6-2026.png" alt="">

            <p class="login-sub">Sistema de Gestión de Tickets</p>
          </div>
 
          <form class="login-form" onsubmit="return false;">
 
            <div class="field-group">
              <label for="email">Usuario</label>
              <div class="input-wrap">
                <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                <input type="text" id="email" placeholder="correo@empresa.com" autocomplete="username" />
              </div>
            </div>
 
            <div class="field-group">
              <label for="password">Contraseña</label>
              <div class="input-wrap">
                <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
                <button type="button" class="toggle-pw" id="togglePw" aria-label="Mostrar contraseña">
                  <svg id="eye-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
              </div>
            </div>
 
            <button type="submit" class="btn-login">Iniciar sesión</button>
 
          </form>
 
          <p class="login-footer">© 2026 SGT Professionals · Todos los derechos reservados</p>
 
        </div>
      </div>


        </div>
      </div>
    </main>
    <script type="module" src="/FRONTEND/js/main.js"></script>
  </body>
</html>
