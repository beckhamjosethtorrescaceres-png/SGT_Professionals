<section class="login-page">
  <form class="login-card">
    <img class="login-logo" src="./FRONTEND/img/-SGT-Professionals-2-6-2026.png" alt="SGT Professionals" />

    <div class="login-header">
      <h1>Iniciar sesion</h1>
      <p>Accede a tu cuenta de SGT Professionals</p>
    </div>

    <label class="field">
      <span>Correo electronico</span>
      <input type="email" name="email" placeholder="usuario@correo.com" />
    </label>

    <label class="field">
      <span>Contrasena</span>
      <input type="password" name="password" placeholder="Ingresa tu contrasena" />
    </label>
    <button type="submit">Entrar</button>
  </form>
</section>
